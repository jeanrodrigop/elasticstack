# =============================================================================
# Default Logstash pipeline
#
# Inputs:  Beats (5044) and raw TCP JSON lines (5000).
# Output:  core Elasticsearch, into daily logs-* indices.
# Edit freely — the file is bind-mounted, just restart the logstash container.
# =============================================================================

input {
  beats {
    port => 5044
  }

  tcp {
    port  => 5000
    codec => json_lines
  }
}

filter {
  # Tag where the event entered so you can branch on it downstream.
  mutate {
    add_field => { "[@metadata][ingest_pipeline]" => "logstash" }
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    # Daily index, e.g. logs-2026.06.17
    index    => "logs-%{+YYYY.MM.dd}"
  }

  # Uncomment while developing to also see events in the container logs:
  # stdout { codec => rubydebug }
}
